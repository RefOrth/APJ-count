<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APJ Recording Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #e8ff47;
    --accent-dim: rgba(232,255,71,0.15);
    --accent-glow: rgba(232,255,71,0.3);
    --text: #f0f0f5;
    --muted: #555568;
    --faded: #2a2a38;
    --red: #ff4747;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 48px 40px 24px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    border-bottom: 1px solid var(--border);
  }

  .site-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 5vw, 52px);
    letter-spacing: 0.08em;
    color: var(--text);
  }

  .site-title span {
    color: var(--accent);
  }

  .live-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
    margin-bottom: 4px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .timezone-note {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    line-height: 1.5;
  }

  main {
    position: relative;
    z-index: 1;
    padding: 40px;
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* NEXT UP — big featured card */
  .card {
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface);
    padding: 28px 32px;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  .card.next {
    border-color: var(--accent);
    background: linear-gradient(135deg, rgba(232,255,71,0.06) 0%, var(--surface) 60%);
    box-shadow: 0 0 40px var(--accent-glow), inset 0 0 40px rgba(232,255,71,0.02);
    padding: 36px 40px;
  }

  .card.next::before {
    content: 'UP NEXT';
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    opacity: 0.8;
  }

  .card.past {
    opacity: 0.28;
    filter: grayscale(0.6);
    border-color: var(--faded);
    background: transparent;
  }

  .card.past .card-title {
    text-decoration: line-through;
    text-decoration-color: var(--muted);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }

  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(18px, 3vw, 26px);
    letter-spacing: 0.06em;
    color: var(--text);
  }

  .card.next .card-title {
    font-size: clamp(22px, 4vw, 36px);
    color: var(--accent);
  }

  .card-date {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
  }

  .card.next .card-date {
    color: rgba(232,255,71,0.6);
    font-size: 13px;
  }

  /* Countdown digits */
  .countdown {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .cd-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .cd-value {
    font-family: 'Bebas Neue', sans-serif;
    line-height: 1;
    color: var(--text);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 6px 14px 4px;
    min-width: 52px;
    text-align: center;
    font-size: 32px;
  }

  .card.next .cd-value {
    font-size: clamp(48px, 8vw, 80px);
    color: var(--accent);
    background: rgba(232,255,71,0.06);
    border-color: rgba(232,255,71,0.2);
    min-width: 90px;
    padding: 10px 20px 6px;
  }

  .cd-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .card.next .cd-label {
    font-size: 10px;
    color: rgba(232,255,71,0.5);
  }

  .cd-sep {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--muted);
    margin-bottom: 14px;
    line-height: 1;
  }

  .card.next .cd-sep {
    font-size: clamp(40px, 6vw, 64px);
    color: rgba(232,255,71,0.3);
    margin-bottom: 22px;
  }

  /* Local times */
  .local-times {
    margin-top: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .card.next .local-times {
    font-size: 11px;
    color: rgba(232,255,71,0.4);
    margin-top: 18px;
  }

  .local-times span {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .local-times span::before {
    content: '◆';
    font-size: 6px;
    opacity: 0.5;
  }

  /* LIVE banner */
  .live-banner {
    background: var(--red);
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 0.2em;
    padding: 4px 12px;
    border-radius: 2px;
    animation: livePulse 1.5s ease-in-out infinite;
    margin-left: 8px;
  }

  @keyframes livePulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* Section divider */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 8px;
    padding: 0 2px;
  }

  /* Completed indicator for past cards */
  .completed-mark {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  @media (max-width: 600px) {
    header { padding: 28px 20px 16px; flex-wrap: wrap; }
    main { padding: 20px; gap: 12px; }
    .card { padding: 20px; }
    .card.next { padding: 24px 20px; }
    .countdown { gap: 4px; }
    .cd-value { min-width: 42px; font-size: 26px; padding: 5px 10px 3px; }
    .card.next .cd-value { min-width: 64px; padding: 8px 12px 5px; }
  }
</style>
</head>
<body>

<header>
  <div class="live-dot"></div>
  <div class="site-title">APJ <span>Recording</span> Countdown</div>
  <div class="timezone-note" id="tzNote">Loading timezone…</div>
</header>

<main id="cardsContainer"></main>

<script>
// All recordings at 9:30 AM Central
// Central = America/Chicago
const recordings = [
  { id: 'FY26 #18', month: 4,  day: 1,  year: 2026 },
  { id: 'FY26 #19', month: 4,  day: 7,  year: 2026 },
  { id: 'FY26 #20', month: 4,  day: 14, year: 2026 },
  { id: 'FY26 #21', month: 4,  day: 21, year: 2026 },
  { id: 'FY27 #01', month: 7,  day: 7,  year: 2026 },
  { id: 'FY27 #02', month: 7,  day: 24, year: 2026 },
  { id: 'FY27 #03', month: 7,  day: 28, year: 2026 },
  { id: 'FY27 #04', month: 7,  day: 31, year: 2026 },
  { id: 'FY27 #05', month: 9,  day: 22, year: 2026 },
  { id: 'FY27 #06', month: 10, day: 30, year: 2026 },
  { id: 'FY27 #07', month: 11, day: 3,  year: 2026 },
  { id: 'FY27 #08', month: 11, day: 17, year: 2026 },
  { id: 'FY27 #09', month: 11, day: 24, year: 2026 },
  { id: 'FY27 #10', month: 12, day: 1,  year: 2026 },
  { id: 'FY27 #11', month: 12, day: 8,  year: 2026 },
  { id: 'FY27 #12', month: 12, day: 15, year: 2026 },
];

// Get UTC timestamp for 9:30 AM Central on a given date
// We build the date string and let Intl handle DST
function getCentralTime(year, month, day) {
  // Create a Date in Central time zone using a trick:
  // Format: "YYYY-MM-DDTHH:mm:ss" interpreted as Central
  const pad = n => String(n).padStart(2, '0');
  const str = `${year}-${pad(month)}-${pad(day)}T09:30:00`;
  // Use Intl to figure out the UTC offset for that date in Chicago
  const ref = new Date(str + 'Z');
  const centralFormatter = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/Chicago',
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false
  });
  // Binary-search-free approach: use epoch math
  // Simpler: use the offset from a known reference
  // Best approach: construct via toLocaleString parsing
  const approx = new Date(`${year}-${pad(month)}-${pad(day)}T15:30:00Z`); // rough UTC for CST
  // Iterate to find exact UTC
  let test = approx;
  for (let i = 0; i < 2; i++) {
    const parts = centralFormatter.formatToParts(test);
    const p = {};
    parts.forEach(pt => p[pt.type] = pt.value);
    const testLocal = new Date(`${p.year}-${p.month}-${p.day}T${p.hour}:${p.minute}:${p.second}Z`);
    const diff = testLocal - new Date(`${year}-${pad(month)}-${pad(day)}T09:30:00Z`);
    test = new Date(test.getTime() - diff);
  }
  return test;
}

function formatLocalTime(date, tz) {
  return date.toLocaleTimeString('en-US', {
    timeZone: tz,
    hour: 'numeric',
    minute: '2-digit',
    hour12: true
  });
}

function formatDateShort(date) {
  return date.toLocaleDateString('en-US', {
    month: 'numeric',
    day: 'numeric',
    year: '2-digit',
    timeZone: 'America/Chicago'
  });
}

function pad2(n) { return String(n).padStart(2, '0'); }

function getCountdown(target) {
  const diff = target - Date.now();
  if (diff <= 0) return null;
  const total = Math.floor(diff / 1000);
  return {
    d: Math.floor(total / 86400),
    h: Math.floor((total % 86400) / 3600),
    m: Math.floor((total % 3600) / 60),
    s: total % 60
  };
}

// Build initial cards
const events = recordings.map(r => {
  const target = getCentralTime(r.year, r.month, r.day);
  const mplsTime = formatLocalTime(target, 'America/Chicago'); // Minneapolis = Central
  const phxTime = formatLocalTime(target, 'America/Phoenix');
  return { ...r, target, mplsTime, phxTime, dateStr: formatDateShort(target) };
});

const userTZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
document.getElementById('tzNote').innerHTML =
  `Your timezone: <strong>${userTZ}</strong>`;

function render() {
  const now = Date.now();
  const container = document.getElementById('cardsContainer');

  // Find next upcoming
  let nextIdx = -1;
  for (let i = 0; i < events.length; i++) {
    if (events[i].target > now) { nextIdx = i; break; }
  }

  let html = '';

  // Past section label if any are past
  const pastCount = events.filter(e => e.target <= now).length;
  if (pastCount > 0 && nextIdx > 0) {
    // past cards rendered after future (put them at bottom actually — keep chronological)
  }

  events.forEach((ev, idx) => {
    const isPast = ev.target <= now;
    const isNext = idx === nextIdx;
    const isLive = !isPast && ev.target - now < 3600000 && ev.target - now > 0; // within 1hr

    const cd = getCountdown(ev.target);

    let cdHTML = '';
    if (isPast) {
      cdHTML = `<div class="completed-mark">RECORDED</div>`;
    } else if (cd) {
      const sep = (s) => `<div class="cd-sep">${s}</div>`;
      if (isNext) {
        cdHTML = `<div class="countdown">
          <div class="cd-unit"><div class="cd-value" id="d${idx}">${pad2(cd.d)}</div><div class="cd-label">Days</div></div>
          ${sep(':')}
          <div class="cd-unit"><div class="cd-value" id="h${idx}">${pad2(cd.h)}</div><div class="cd-label">Hours</div></div>
          ${sep(':')}
          <div class="cd-unit"><div class="cd-value" id="m${idx}">${pad2(cd.m)}</div><div class="cd-label">Mins</div></div>
          ${sep(':')}
          <div class="cd-unit"><div class="cd-value" id="s${idx}">${pad2(cd.s)}</div><div class="cd-label">Secs</div></div>
        </div>`;
      } else {
        cdHTML = `<div class="countdown">
          <div class="cd-unit"><div class="cd-value" id="d${idx}">${pad2(cd.d)}</div><div class="cd-label">D</div></div>
          ${sep(':')}
          <div class="cd-unit"><div class="cd-value" id="h${idx}">${pad2(cd.h)}</div><div class="cd-label">H</div></div>
          ${sep(':')}
          <div class="cd-unit"><div class="cd-value" id="m${idx}">${pad2(cd.m)}</div><div class="cd-label">M</div></div>
          ${sep(':')}
          <div class="cd-unit"><div class="cd-value" id="s${idx}">${pad2(cd.s)}</div><div class="cd-label">S</div></div>
        </div>`;
      }
    }

    const localUserTime = ev.target.toLocaleTimeString('en-US', {
      timeZone: userTZ,
      hour: 'numeric',
      minute: '2-digit',
      hour12: true
    });

    html += `
      <div class="card ${isPast ? 'past' : ''} ${isNext ? 'next' : ''}">
        <div class="card-header">
          <div class="card-title">${ev.id}${isLive ? '<span class="live-banner">LIVE</span>' : ''}</div>
          <div class="card-date">${ev.dateStr} • 9:30 AM Central</div>
        </div>
        ${cdHTML}
        ${!isPast ? `<div class="local-times">
          <span>Minneapolis: ${ev.mplsTime}</span>
          <span>Phoenix: ${ev.phxTime}</span>
          ${userTZ !== 'America/Chicago' && userTZ !== 'America/Phoenix' ? `<span>Your time: ${localUserTime}</span>` : ''}
        </div>` : ''}
      </div>`;
  });

  container.innerHTML = html;
}

// Live tick update (only update numbers, don't re-render full DOM after first paint)
function tick() {
  const now = Date.now();
  let nextIdx = -1;
  for (let i = 0; i < events.length; i++) {
    if (events[i].target > now) { nextIdx = i; break; }
  }

  events.forEach((ev, idx) => {
    const isPast = ev.target <= now;
    if (isPast) return;
    const cd = getCountdown(ev.target);
    if (!cd) { render(); return; } // transition: re-render
    const dEl = document.getElementById(`d${idx}`);
    const hEl = document.getElementById(`h${idx}`);
    const mEl = document.getElementById(`m${idx}`);
    const sEl = document.getElementById(`s${idx}`);
    if (dEl) dEl.textContent = pad2(cd.d);
    if (hEl) hEl.textContent = pad2(cd.h);
    if (mEl) mEl.textContent = pad2(cd.m);
    if (sEl) sEl.textContent = pad2(cd.s);
  });
}

render();
setInterval(tick, 1000);
// Full re-render once a minute to catch transitions cleanly
setInterval(render, 60000);
</script>
</body>
</html>
