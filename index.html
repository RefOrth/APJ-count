<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APJ Recording Counters</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --border: #1e2330;
    --accent: #c9a96e;
    --accent-dim: #7a6340;
    --text: #e8e2d9;
    --text-muted: #4a5168;
    --text-dim: #2a2f40;
    --past-text: #2a2f40;
    --next-glow: rgba(201,169,110,0.12);
    --fy27: #7ab0d4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    padding: 52px 24px 80px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,169,110,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,169,110,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 52px;
  }

  .epigraph {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.82rem;
    color: var(--accent-dim);
    letter-spacing: 0.1em;
    margin-bottom: 16px;
  }

  .site-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.7rem, 4vw, 2.6rem);
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.05em;
    line-height: 1.1;
  }

  .title-rule {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 14px auto 0;
  }
  .title-rule span {
    height: 1px;
    width: 48px;
    background: var(--accent);
    opacity: 0.35;
    display: block;
  }
  .title-rule em {
    font-size: 0.45rem;
    letter-spacing: 0.3em;
    color: var(--accent-dim);
    font-style: normal;
    text-transform: uppercase;
  }

  #clock {
    margin-top: 10px;
    font-size: 0.58rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  /* ── FY section ── */
  .fy-section { margin-bottom: 40px; }

  .fy-label {
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
    padding-left: 2px;
  }

  /* ── Cards ── */
  .recording-card {
    position: relative;
    border: 1px solid var(--border);
    border-radius: 3px;
    margin-bottom: 7px;
    overflow: hidden;
    transition: opacity 0.4s;
  }

  /* PAST */
  .recording-card.past {
    background: #0f1118;
    border-color: #161820;
    opacity: 0.32;
  }

  .recording-card.past .card-inner {
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .recording-card.past .ep-label {
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  .recording-card.past .ep-date {
    font-size: 0.58rem;
    color: var(--text-dim);
  }

  /* NEXT */
  .recording-card.next {
    background: linear-gradient(135deg, #161921 0%, #1b1e28 100%);
    border-color: var(--accent-dim);
    box-shadow:
      0 0 48px var(--next-glow),
      0 0 100px rgba(201,169,110,0.03),
      inset 0 1px 0 rgba(201,169,110,0.08);
  }

  .recording-card.next::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--accent) 0%, rgba(201,169,110,0.1) 100%);
  }

  .next-badge {
    position: absolute;
    top: 14px; right: 16px;
    font-size: 0.48rem;
    letter-spacing: 0.28em;
    color: var(--accent);
    opacity: 0.65;
    text-transform: uppercase;
  }

  /* FUTURE */
  .recording-card.future {
    background: var(--surface);
  }

  /* ── Card inner ── */
  .card-inner { padding: 14px 18px; }

  .card-top {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }

  .ep-label {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.07em;
  }

  .recording-card.future .ep-label {
    color: var(--fy27);
    opacity: 0.55;
  }

  .ep-date {
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  /* Times */
  .times-row {
    display: flex;
    gap: 18px;
    margin-top: 5px;
    margin-bottom: 0;
  }

  .time-entry {
    font-size: 0.52rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .time-entry b {
    color: var(--text-muted);
    font-weight: 400;
    margin-right: 3px;
  }

  /* ── BIG countdown ── */
  .countdown-big {
    display: flex;
    align-items: flex-end;
    margin-top: 20px;
    border-top: 1px solid rgba(201,169,110,0.1);
    padding-top: 18px;
  }

  .cd-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 0 0;
    margin-right: 16px;
    border-right: 1px solid var(--border);
  }
  .cd-unit:last-child { border-right: none; padding-right: 0; margin-right: 0; }

  .cd-value {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 7vw, 4.2rem);
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    min-width: 2ch;
    text-align: center;
  }

  .cd-label {
    font-size: 0.42rem;
    letter-spacing: 0.22em;
    color: var(--accent-dim);
    text-transform: uppercase;
    margin-top: 5px;
  }

  /* ── Small countdown for future ── */
  .countdown-small {
    font-size: 0.58rem;
    color: var(--text-muted);
    opacity: 0.55;
    margin-left: auto;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    margin-top: 52px;
    font-size: 0.52rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="epigraph">"So teach us to number our days"</div>
    <h1 class="site-title">APJ Recording Counters</h1>
    <div class="title-rule"><span></span><em>Live</em><span></span></div>
    <div id="clock"></div>
  </div>

  <div id="recordings"></div>

  <div class="footer">Countdown in your local time &nbsp;·&nbsp; Recording times shown for Minneapolis (Central) and Phoenix (MST/no DST)</div>
</div>

<script>
// ── Data (Central time) ──────────────────────────────────────────
const recordings = [
  { label: 'FY26 #18', date: '2026-04-01', ct: '10:30', fy: 'FY26' },
  { label: 'FY26 #19', date: '2026-04-07', ct: '09:30', fy: 'FY26' },
  { label: 'FY26 #20', date: '2026-04-14', ct: '09:30', fy: 'FY26' },
  { label: 'FY26 #21', date: '2026-04-21', ct: '09:30', fy: 'FY26' },
  { label: 'FY27 #01', date: '2026-07-07', ct: '09:30', fy: 'FY27' },
  { label: 'FY27 #02', date: '2026-07-24', ct: '09:30', fy: 'FY27' },
  { label: 'FY27 #03', date: '2026-07-28', ct: '09:30', fy: 'FY27' },
  { label: 'FY27 #04', date: '2026-07-31', ct: '09:30', fy: 'FY27' },
  { label: 'FY27 #05', date: '2026-09-22', ct: '09:30', fy: 'FY27' },
  { label: 'FY27 #06', date: '2026-10-30', ct: '09:30', fy: 'FY27' },
  { label: 'FY27 #07', date: '2026-11-03', ct: '09:30', fy: 'FY27' },
  { label: 'FY27 #08', date: '2026-11-17', ct: '09:30', fy: 'FY27' },
  { label: 'FY27 #09', date: '2026-11-24', ct: '09:30', fy: 'FY27' },
  { label: 'FY27 #10', date: '2026-12-01', ct: '09:30', fy: 'FY27' },
  { label: 'FY27 #11', date: '2026-12-08', ct: '09:30', fy: 'FY27' },
  { label: 'FY27 #12', date: '2026-12-15', ct: '09:30', fy: 'FY27' },
];

// ── Central → UTC ────────────────────────────────────────────────
function centralToUTC(dateStr, timeStr) {
  const [yr, mo, dy] = dateStr.split('-').map(Number);
  const [hr, mn] = timeStr.split(':').map(Number);
  // Create a date object representing this wall-clock time in local time,
  // then adjust by the difference between local and Chicago.
  const localDate = new Date(yr, mo - 1, dy, hr, mn, 0);
  // Format that UTC moment as Chicago time
  const chicagoParts = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/Chicago',
    year: 'numeric', month: 'numeric', day: 'numeric',
    hour: 'numeric', minute: 'numeric', second: 'numeric',
    hour12: false
  }).formatToParts(localDate);
  const cp = {};
  chicagoParts.forEach(p => { if (p.type !== 'literal') cp[p.type] = parseInt(p.value); });
  const chicagoAsLocal = new Date(cp.year, cp.month - 1, cp.day,
    cp.hour === 24 ? 0 : cp.hour, cp.minute, cp.second);
  const offset = localDate - chicagoAsLocal;
  return new Date(localDate.getTime() + offset);
}

// ── Format helpers ───────────────────────────────────────────────
function fmtTime(utc, tz) {
  return new Intl.DateTimeFormat('en-US', {
    timeZone: tz, hour: 'numeric', minute: '2-digit', hour12: true
  }).format(utc);
}
function fmtDate(utc, tz) {
  return new Intl.DateTimeFormat('en-US', {
    timeZone: tz, weekday: 'short', month: 'short', day: 'numeric'
  }).format(utc);
}
function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }

function countdown(utc) {
  const diff = utc - Date.now();
  if (diff <= 0) return null;
  return {
    days:  Math.floor(diff / 86400000),
    hours: Math.floor((diff % 86400000) / 3600000),
    mins:  Math.floor((diff % 3600000) / 60000),
    secs:  Math.floor((diff % 60000) / 1000),
  };
}

// ── Pre-compute UTC times ────────────────────────────────────────
const recs = recordings.map(r => ({ ...r, utc: centralToUTC(r.date, r.ct) }));

// ── Render ───────────────────────────────────────────────────────
function render() {
  const now = Date.now();
  const nextIdx = recs.findIndex(r => r.utc > now);
  const container = document.getElementById('recordings');
  container.innerHTML = '';

  let curFY = null, fyDiv = null;

  recs.forEach((rec, i) => {
    const type = rec.utc <= now ? 'past' : (i === nextIdx ? 'next' : 'future');

    if (rec.fy !== curFY) {
      curFY = rec.fy;
      fyDiv = document.createElement('div');
      fyDiv.className = 'fy-section';
      fyDiv.innerHTML = `<div class="fy-label">${rec.fy}</div>`;
      container.appendChild(fyDiv);
    }

    const card = document.createElement('div');
    card.className = `recording-card ${type}`;
    card.dataset.label = rec.label;

    const mnDate = fmtDate(rec.utc, 'America/Chicago');
    const mnTime = fmtTime(rec.utc, 'America/Chicago');
    const phxTime = fmtTime(rec.utc, 'America/Phoenix');
    const phxDate = fmtDate(rec.utc, 'America/Phoenix');

    if (type === 'past') {
      card.innerHTML = `
        <div class="card-inner">
          <span class="ep-label">${rec.label}</span>
          <span class="ep-date">${mnDate}</span>
        </div>`;
    } else if (type === 'next') {
      card.innerHTML = `
        <span class="next-badge">Next</span>
        <div class="card-inner">
          <div class="card-top">
            <span class="ep-label">${rec.label}</span>
            <span class="ep-date">${mnDate}</span>
          </div>
          <div class="times-row">
            <div class="time-entry"><b>MN</b>${mnDate} · ${mnTime}</div>
            <div class="time-entry"><b>PHX</b>${phxDate} · ${phxTime}</div>
          </div>
          <div class="countdown-big">
            <div class="cd-unit"><span class="cd-value" id="cd-d">—</span><span class="cd-label">Days</span></div>
            <div class="cd-unit"><span class="cd-value" id="cd-h">—</span><span class="cd-label">Hours</span></div>
            <div class="cd-unit"><span class="cd-value" id="cd-m">—</span><span class="cd-label">Min</span></div>
            <div class="cd-unit"><span class="cd-value" id="cd-s">—</span><span class="cd-label">Sec</span></div>
          </div>
        </div>`;
    } else {
      const safeId = 'sm_' + rec.label.replace(/\W/g, '_');
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-top">
            <span class="ep-label">${rec.label}</span>
            <span class="ep-date">${mnDate}</span>
            <span class="countdown-small" id="${safeId}">—</span>
          </div>
          <div class="times-row">
            <div class="time-entry"><b>MN</b>${mnTime}</div>
            <div class="time-entry"><b>PHX</b>${phxTime}</div>
          </div>
        </div>`;
    }

    fyDiv.appendChild(card);
  });
}

// ── Tick (every second) ──────────────────────────────────────────
function tick() {
  const now = Date.now();

  // Big countdown
  const cdD = document.getElementById('cd-d');
  if (cdD) {
    const nextRec = recs.find(r => r.utc > now);
    if (nextRec) {
      const cd = countdown(nextRec.utc);
      if (cd) {
        document.getElementById('cd-d').textContent = pad(cd.days);
        document.getElementById('cd-h').textContent = pad(cd.hours);
        document.getElementById('cd-m').textContent = pad(cd.mins);
        document.getElementById('cd-s').textContent = pad(cd.secs);
      }
    }
  }

  // Small countdowns
  recs.forEach(rec => {
    if (rec.utc <= now) return;
    const id = 'sm_' + rec.label.replace(/\W/g, '_');
    const el = document.getElementById(id);
    if (!el) return;
    const cd = countdown(rec.utc);
    if (!cd) return;
    el.textContent = cd.days > 0
      ? `${cd.days}d ${pad(cd.hours)}h ${pad(cd.mins)}m`
      : `${pad(cd.hours)}h ${pad(cd.mins)}m ${pad(cd.secs)}s`;
  });

  // Clock
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true });
}

// ── Init ─────────────────────────────────────────────────────────
render();
tick();
setInterval(tick, 1000);
setInterval(render, 30000); // re-render periodically to catch state changes
</script>
</body>
</html>
