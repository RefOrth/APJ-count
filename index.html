<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APJ Recording Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d12;
    --surface: #12151d;
    --border: #252a38;
    --border-dim: #181c26;
    --accent: #e8c27a;
    --accent-dim: #8a6f3a;
    --accent-faint: rgba(232,194,122,0.08);
    --text: #f0ecdf;
    --text-sub: #8a92a8;
    --text-muted: #404860;
    --text-dim: #252935;
    --next-glow: rgba(232,194,122,0.14);
    --fy27: #88bbdf;
    --fy27-dim: #3a6080;
    --live: #ff4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    padding: 52px 24px 80px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,194,122,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,194,122,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 52px;
  }

  .epigraph {
    font-size: 0.7rem;
    font-weight: 300;
    color: var(--accent-dim);
    letter-spacing: 0.12em;
    margin-bottom: 14px;
    font-style: italic;
  }

  .site-title {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1.1;
  }

  .title-rule {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 14px auto 0;
  }
  .title-rule span {
    height: 1px;
    width: 48px;
    background: var(--accent);
    opacity: 0.3;
    display: block;
  }
  .title-rule em {
    font-size: 0.45rem;
    letter-spacing: 0.3em;
    color: var(--accent-dim);
    font-style: normal;
    text-transform: uppercase;
  }

  #clock {
    margin-top: 10px;
    font-size: 0.6rem;
    font-weight: 400;
    color: var(--text-sub);
    letter-spacing: 0.1em;
  }

  /* ── FY section ── */
  .fy-section { margin-bottom: 36px; }

  .fy-label {
    font-size: 0.52rem;
    font-weight: 600;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    padding-left: 2px;
  }

  /* ── Cards ── */
  .recording-card {
    position: relative;
    border: 1px solid var(--border-dim);
    border-radius: 3px;
    margin-bottom: 6px;
    overflow: hidden;
    transition: opacity 0.4s;
  }

  /* PAST */
  .recording-card.past {
    background: #0e1018;
    border-color: #14161e;
    opacity: 0.28;
  }
  .recording-card.past .card-inner {
    padding: 7px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .recording-card.past .ep-label {
    font-size: 0.6rem;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.07em;
  }
  .recording-card.past .ep-date {
    font-size: 0.58rem;
    color: var(--text-muted);
    font-weight: 300;
  }

  /* LIVE (within 75 min after start) */
  .recording-card.live {
    background: #130a0a;
    border-color: #3a1010;
  }
  .recording-card.live::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--live);
    animation: livepulse 1.2s ease-in-out infinite;
  }

  @keyframes livepulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .live-badge {
    position: absolute;
    top: 13px; right: 14px;
    font-size: 0.52rem;
    font-weight: 700;
    letter-spacing: 0.22em;
    color: var(--live);
    text-transform: uppercase;
    animation: livepulse 1.2s ease-in-out infinite;
  }

  /* NEXT */
  .recording-card.next {
    background: linear-gradient(135deg, #14171f 0%, #181c27 100%);
    border-color: var(--accent-dim);
    box-shadow:
      0 0 48px var(--next-glow),
      0 0 100px rgba(232,194,122,0.04),
      inset 0 1px 0 rgba(232,194,122,0.07);
  }
  .recording-card.next::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--accent) 0%, rgba(232,194,122,0.1) 100%);
  }

  .next-badge {
    position: absolute;
    top: 13px; right: 14px;
    font-size: 0.48rem;
    font-weight: 600;
    letter-spacing: 0.3em;
    color: var(--accent);
    opacity: 0.7;
    text-transform: uppercase;
  }

  /* FUTURE */
  .recording-card.future {
    background: var(--surface);
    border-color: var(--border);
  }

  /* ── Card inner ── */
  .card-inner { padding: 13px 18px; }

  .card-top {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }

  .ep-label {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.07em;
  }

  .recording-card.future .ep-label {
    color: var(--fy27);
    opacity: 0.7;
  }

  .recording-card.live .ep-label {
    color: #ff7070;
  }

  .ep-date {
    font-size: 0.65rem;
    font-weight: 400;
    color: var(--text-sub);
    letter-spacing: 0.04em;
  }

  /* Times */
  .times-row {
    display: flex;
    gap: 20px;
    margin-top: 6px;
  }
  .time-entry {
    font-size: 0.52rem;
    font-weight: 300;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }
  .time-entry b {
    font-weight: 600;
    color: var(--text-sub);
    margin-right: 4px;
  }

  /* ── BIG countdown ── */
  .countdown-big {
    display: flex;
    align-items: flex-end;
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px solid rgba(232,194,122,0.1);
  }

  .cd-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-right: 18px;
    margin-right: 18px;
    border-right: 1px solid var(--border);
  }
  .cd-unit:last-child { border-right: none; padding-right: 0; margin-right: 0; }

  .cd-value {
    font-size: clamp(2.6rem, 7vw, 4.4rem);
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -0.04em;
    font-variant-numeric: tabular-nums;
    min-width: 2ch;
    text-align: center;
  }

  .cd-label {
    font-size: 0.42rem;
    font-weight: 500;
    letter-spacing: 0.25em;
    color: var(--accent-dim);
    text-transform: uppercase;
    margin-top: 5px;
  }

  /* ── Small countdown for future ── */
  .countdown-small {
    font-size: 0.58rem;
    font-weight: 400;
    color: var(--text-sub);
    opacity: 0.7;
    margin-left: auto;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    margin-top: 52px;
    font-size: 0.52rem;
    font-weight: 300;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="epigraph">"So teach us to number our days"</div>
    <h1 class="site-title">APJ Recording Countdown</h1>
    <div class="title-rule"><span></span><em>Live</em><span></span></div>
    <div id="clock"></div>
  </div>

  <div id="recordings"></div>

  <div class="footer">Times shown in your local timezone &nbsp;·&nbsp; Minneapolis = Central &nbsp;·&nbsp; Phoenix = MST (no DST)</div>
</div>

<script>
const LIVE_WINDOW_MS = 75 * 60 * 1000; // 75 minutes

const recordings = [
  { label: 'FY26 #18', date: '2026-04-01', ct: '10:30', fy: 'FY26' },
  { label: 'FY26 #19', date: '2026-04-07', ct: '09:30', fy: 'FY26' },
  { label: 'FY26 #20', date: '2026-04-14', ct: '09:30', fy: 'FY26' },
  { label: 'FY26 #21', date: '2026-04-21', ct: '09:30', fy: 'FY26' },
  { label: 'FY27 #01', date: '2026-07-07', ct: '09:30', fy: 'FY27' },
  { label: 'FY27 #02', date: '2026-07-24', ct: '09:30', fy: 'FY27' },
  { label: 'FY27 #03', date: '2026-07-28', ct: '09:30', fy: 'FY27' },
  { label: 'FY27 #04', date: '2026-07-31', ct: '09:30', fy: 'FY27' },
  { label: 'FY27 #05', date: '2026-09-22', ct: '09:30', fy: 'FY27' },
  { label: 'FY27 #06', date: '2026-10-30', ct: '09:30', fy: 'FY27' },
  { label: 'FY27 #07', date: '2026-11-03', ct: '09:30', fy: 'FY27' },
  { label: 'FY27 #08', date: '2026-11-17', ct: '09:30', fy: 'FY27' },
  { label: 'FY27 #09', date: '2026-11-24', ct: '09:30', fy: 'FY27' },
  { label: 'FY27 #10', date: '2026-12-01', ct: '09:30', fy: 'FY27' },
  { label: 'FY27 #11', date: '2026-12-08', ct: '09:30', fy: 'FY27' },
  { label: 'FY27 #12', date: '2026-12-15', ct: '09:30', fy: 'FY27' },
];

function centralToUTC(dateStr, timeStr) {
  const [yr, mo, dy] = dateStr.split('-').map(Number);
  const [hr, mn] = timeStr.split(':').map(Number);
  const localDate = new Date(yr, mo - 1, dy, hr, mn, 0);
  const chicagoParts = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/Chicago',
    year: 'numeric', month: 'numeric', day: 'numeric',
    hour: 'numeric', minute: 'numeric', second: 'numeric',
    hour12: false
  }).formatToParts(localDate);
  const cp = {};
  chicagoParts.forEach(p => { if (p.type !== 'literal') cp[p.type] = parseInt(p.value); });
  const chicagoAsLocal = new Date(cp.year, cp.month - 1, cp.day,
    cp.hour === 24 ? 0 : cp.hour, cp.minute, cp.second);
  return new Date(localDate.getTime() + (localDate - chicagoAsLocal));
}

function fmtTime(utc, tz) {
  return new Intl.DateTimeFormat('en-US', {
    timeZone: tz, hour: 'numeric', minute: '2-digit', hour12: true
  }).format(utc);
}
function fmtDate(utc, tz) {
  return new Intl.DateTimeFormat('en-US', {
    timeZone: tz, weekday: 'short', month: 'short', day: 'numeric'
  }).format(utc);
}
function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }

function getCountdown(utcMs) {
  const diff = utcMs - Date.now();
  if (diff <= 0) return null;
  return {
    days:  Math.floor(diff / 86400000),
    hours: Math.floor((diff % 86400000) / 3600000),
    mins:  Math.floor((diff % 3600000) / 60000),
    secs:  Math.floor((diff % 60000) / 1000),
  };
}

function getType(rec) {
  const now = Date.now();
  const elapsed = now - rec.utc;
  if (elapsed >= LIVE_WINDOW_MS) return 'past';      // fully past
  if (elapsed >= 0) return 'live';                   // 0–75 min after start
  // future — check if it's the next upcoming
  return null; // resolved below
}

const recs = recordings.map(r => ({ ...r, utc: centralToUTC(r.date, r.ct).getTime() }));

function render() {
  const now = Date.now();
  const container = document.getElementById('recordings');
  container.innerHTML = '';

  // Determine types
  const types = recs.map((rec, i) => {
    const elapsed = now - rec.utc;
    if (elapsed >= LIVE_WINDOW_MS) return 'past';
    if (elapsed >= 0) return 'live';
    return 'upcoming'; // resolve next vs future below
  });

  const nextIdx = types.findIndex(t => t === 'upcoming');
  const finalTypes = types.map((t, i) => t === 'upcoming' ? (i === nextIdx ? 'next' : 'future') : t);

  let curFY = null, fyDiv = null;

  recs.forEach((rec, i) => {
    const type = finalTypes[i];

    if (rec.fy !== curFY) {
      curFY = rec.fy;
      fyDiv = document.createElement('div');
      fyDiv.className = 'fy-section';
      fyDiv.innerHTML = `<div class="fy-label">${rec.fy}</div>`;
      container.appendChild(fyDiv);
    }

    const card = document.createElement('div');
    card.className = `recording-card ${type}`;
    card.dataset.label = rec.label;

    const mnDate = fmtDate(rec.utc, 'America/Chicago');
    const mnTime = fmtTime(rec.utc, 'America/Chicago');
    const phxTime = fmtTime(rec.utc, 'America/Phoenix');
    const phxDate = fmtDate(rec.utc, 'America/Phoenix');

    const timesHTML = `
      <div class="times-row">
        <div class="time-entry"><b>MN</b>${mnDate} · ${mnTime}</div>
        <div class="time-entry"><b>PHX</b>${phxDate} · ${phxTime}</div>
      </div>`;

    if (type === 'past') {
      card.innerHTML = `
        <div class="card-inner">
          <span class="ep-label">${rec.label}</span>
          <span class="ep-date">${mnDate}</span>
        </div>`;

    } else if (type === 'live') {
      const minsLeft = Math.ceil((LIVE_WINDOW_MS - (now - rec.utc)) / 60000);
      card.innerHTML = `
        <span class="live-badge">● Live</span>
        <div class="card-inner">
          <div class="card-top">
            <span class="ep-label">${rec.label}</span>
            <span class="ep-date">${mnDate}</span>
          </div>
          ${timesHTML}
          <div style="margin-top:12px; font-size:0.6rem; font-weight:500; color:#ff7070; letter-spacing:0.08em; opacity:0.8;">
            Recording window · <span id="live-remaining-${i}"></span> remaining
          </div>
        </div>`;

    } else if (type === 'next') {
      card.innerHTML = `
        <span class="next-badge">Next</span>
        <div class="card-inner">
          <div class="card-top">
            <span class="ep-label">${rec.label}</span>
            <span class="ep-date">${mnDate}</span>
          </div>
          ${timesHTML}
          <div class="countdown-big">
            <div class="cd-unit"><span class="cd-value" id="cd-d">--</span><span class="cd-label">Days</span></div>
            <div class="cd-unit"><span class="cd-value" id="cd-h">--</span><span class="cd-label">Hours</span></div>
            <div class="cd-unit"><span class="cd-value" id="cd-m">--</span><span class="cd-label">Min</span></div>
            <div class="cd-unit"><span class="cd-value" id="cd-s">--</span><span class="cd-label">Sec</span></div>
          </div>
        </div>`;

    } else {
      const safeId = 'sm_' + rec.label.replace(/\W/g, '_');
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-top">
            <span class="ep-label">${rec.label}</span>
            <span class="ep-date">${mnDate}</span>
            <span class="countdown-small" id="${safeId}">—</span>
          </div>
          ${timesHTML}
        </div>`;
    }

    fyDiv.appendChild(card);
  });
}

function tick() {
  const now = Date.now();

  // Big countdown (next)
  const cdD = document.getElementById('cd-d');
  if (cdD) {
    const nextRec = recs.find(r => r.utc > now);
    if (nextRec) {
      const cd = getCountdown(nextRec.utc);
      if (cd) {
        document.getElementById('cd-d').textContent = pad(cd.days);
        document.getElementById('cd-h').textContent = pad(cd.hours);
        document.getElementById('cd-m').textContent = pad(cd.mins);
        document.getElementById('cd-s').textContent = pad(cd.secs);
      }
    }
  }

  // Live remaining
  recs.forEach((rec, i) => {
    const el = document.getElementById(`live-remaining-${i}`);
    if (!el) return;
    const elapsed = now - rec.utc;
    const remaining = LIVE_WINDOW_MS - elapsed;
    if (remaining > 0) {
      const m = Math.floor(remaining / 60000);
      const s = Math.floor((remaining % 60000) / 1000);
      el.textContent = `${m}m ${pad(s)}s`;
    }
  });

  // Small countdowns (future)
  recs.forEach(rec => {
    const id = 'sm_' + rec.label.replace(/\W/g, '_');
    const el = document.getElementById(id);
    if (!el) return;
    const cd = getCountdown(rec.utc);
    if (!cd) return;
    el.textContent = cd.days > 0
      ? `${cd.days}d ${pad(cd.hours)}h ${pad(cd.mins)}m`
      : `${pad(cd.hours)}h ${pad(cd.mins)}m ${pad(cd.secs)}s`;
  });

  // Clock
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-US', {
      hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true
    });
}

// Init
render();
tick();
setInterval(tick, 1000);
setInterval(render, 15000); // re-render to catch state changes
</script>
</body>
</html>
